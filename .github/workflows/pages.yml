name: Deploy frontend to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject public API URL
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          if [ -n "$API_BASE_URL" ]; then
            {
              echo '(function configureOrda(window) {'
              echo '  window.ORDA_CONFIG = {'
              printf '    API_BASE_URL: "%s",\n' "$API_BASE_URL"
              echo '    USE_LOCAL_FALLBACK: true,'
              echo '  };'
              echo '})(window);'
            } > frontend/config.js
          fi

      - name: Upload frontend
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
